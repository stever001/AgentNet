name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: Describe the context and pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What would you like to see?
      placeholder: Describe your preferred solution.
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Target Repository
      placeholder: e.g., agentnet, ant-orchestrator
